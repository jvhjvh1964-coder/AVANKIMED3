<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>AVANKIMED: sistema integral</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f4f7fa;
    }

header{
    background:#1565C0;
    color:white;
    padding:20px;
    text-align:center;
    font-size:40px;
    font-weight:bold;
    }

.menu{
    display:flex;
    justify-content:center;
    gap:40px;
    margin-top:80px;
    }

button{
    width:240px;
    height:120px;
    
    font-size:28px;
    border:none;
    border-radius:15px;
    
    cursor:pointer;
    color:white;
    transition:.3s;
    }

button:hover{
    transform:scale(1.05);
    }

#btnPacientes{
    background:yellow;
    color: black;
    }

#btnAgenda{
    background:#2E7D32;
    }
  
#btnAsistencia{
    background:#EF6C00;
    }

#btnEstadistica{
    background:#6A1B9A;
    }

#contenido{
    margin-top:60px;
    text-align:center;
    font-size:28px;
    }

footer{
    position:fixed;
    bottom:0;
    width:100%;
    
    text-align:center;
    padding:10px;
    font-size:12px;
    border-top:1px solid gray;
    background:white;
    }

.modal{
  
  display:none;
  position:fixed;
  left:0;
  top:0;
  
  width:100%;
  height:100%;
  background:rgba(0,0,0,.5);
  z-index:999;
  }
  
.modalContenido{
  
  background:aqua;
  width:500px;
  margin:80px auto;
  padding:25px;
  border-radius:12px;
  box-shadow:0 0 20px yellow;
  }
  
.cerrar{
  
  float:right;
  font-size:30px;
  cursor:pointer;
  font-weight:bold;
  }


.modalContenidoMensaje{

    background:white;
    width:420px;
    margin:180px auto;
    padding:25px;
    border-radius:15px;
    text-align:center;
    box-shadow:0px 0px 20px gray;
}

#tituloMensaje{

    color:#C62828;
    font-size:30px;
}

#textoMensaje{

    font-size:20px;
}

.modalContenidoMensaje button{

    background:#1565C0;
    color:white;
    border:none;
    padding:12px 40px;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}  

  
  
</style>

</head>

<body>

<header>

AVANKIMED

</header>

<div class="menu">

    <button id="btnPacientes" style="font-weight:bold;;">
    NUEVO PACIENTE
    </button>

    <button id="btnAgenda">
    AGENDAMIENTO
    </button>
  
    <button id="btnAsistencia">
    ASISTENCIA
    </button>
    
    <button id="btnEstadistica">
    ESTADÍSTICA
    </button>

</div>

  
<div id="contenido">
    Seleccione una opción
</div>

  
<div id="modalAgenda" class="modal">

    <div class="modalContenido">

        <span class="cerrar" onclick="cerrarAgendamiento()">&times;</span>

        <h2>Nuevo Agendamiento</h2>

        <table> 

            <tr>
                <td>ID Paciente</td>
                <td>
                    <input id="idPaciente" readonly 
                            style="font-size:22px; border-radius:6px; width:150px; text-align:center;">
                </td>
            </tr>

            <tr>
                <td>Fecha Cita</td>
                <td>
                    <input type="date" id="fechaCita" 
                            style="font-size:22px; border-radius:6px; width:150px; text-align:center;">
                </td>
            </tr>

            <tr>
                <td>Hora Cita</td>
                <td>
                    <input type="time" id="horaCita" 
                            style="font-size:22px; border-radius:6px; width:150px; text-align:center;">
                </td>
            </tr>

            <tr>
                <td>Nombre</td>
                <td>
                    <input id="nombrePaciente" oninput="this.value=this.value.toUpperCase()" 
                            style="font-size:22px; border-radius:6px; width:400px;">
                </td>
            </tr>

            <tr>
                <td>Celular</td>
                <td>
                    <input id="celular" style="font-size:22px; border-radius:6px; width:250px;">
                </td>
            </tr>

            <tr>
                <td>Correo</td>
                <td>
                    <input id="correo" oninput="this.value=this.value.toUpperCase()" 
                            style="font-size:22px; border-radius:6px; width:250px;">
                </td>
            </tr>

            <tr>
                <td>Diagnóstico</td>
                <td>
                    <textarea id="diagnostico" oninput="this.value=this.value.toUpperCase()" 
                               rows="4" cols="40"
                                style="font-size:22px; border-radius:6px; width:400px;"></textarea>
                </td>
            </tr>

        </table>

        <br>

        <button onclick="guardarAgendamientoPaciente()" 
                style="color:white; background:blue; font-size:24px; 
                        width:150px; height:45px; font-weight:bold;">
            GUARDAR
        </button>
      
        <div id="mensajeAgendamiento"></div>

    </div>

</div>


<div id="modalNuevoPaciente" class="modal">

    <div class="modalContenido">

        <span class="cerrar" onclick="cerrarNuevoPaciente()">&times;</span>

            <h2>NUEVO PACIENTE</h2>
            
            <table class="formPaciente">
            
            <tr>
            
            <td>ID</td>
            
            <td> <input id="txtID" readonly 
                         style="font-size:22px; border-radius:6px; width:150px; text-align:center;"> </td>
            
            </tr>
            
            <tr>
            
            <td>Nombre</td>
            
            <td> <input
            id="txtNombre"
            oninput="this.value=this.value.toUpperCase()"
            style="font-size:22px; width:400px; border-radius:6px;">
            </td>
            
            </tr>
            
            <tr>
            
            <td>Celular</td>
            
            <td> <input
            id="txtCelular" 
            style="font-size:22px; border-radius:6px; width:250px;"
            maxlength="15">
            </td>
            
            </tr>
            
            <tr>
            
            <td>Correo</td>
            
            <td> <input
            id="txtCorreo" style="font-size:22px; border-radius:6px; width:250px;"
            oninput="this.value=this.value.toUpperCase()">
            </td>
            
            </tr>
            
            <tr>
            
            <td>Diagnóstico</td>
            
            <td> <textarea
            id="txtDiagnostico" 
            style="font-size:22px; border-radius:6px; width:400px;"
            rows="4"
            cols="40"
            oninput="this.value=this.value.toUpperCase()">
            </textarea>
            </td>
            
            </tr>
            
            <tr>
            
            <td colspan="2" align="center">
            
            <button
            onclick="guardarNuevoPaciente()"
            style="color:white; background:navy; font-size:24px; 
                   width:200px; height:70px; font-weight:bold; margin-top:20px;">
              
            💾 GUARDAR
            
            </button>
            
            </td>
            
            </tr>
            
            </table>
            
            <div id="mensajeNuevoPaciente"></div>

    </div>

</div>
  

  
<!-- MODAL MENSAJES -->

<div id="modalMensaje" class="modal">

    <div class="modalContenidoMensaje">

        <h2 id="tituloMensaje"></h2>

        <p id="textoMensaje"></p>

        <br>

        <button onclick="cerrarMensaje()" 
                style="font-size:24px; text-align:center; color:white; background:navy; border-radius:8px; 
                        width:180px; height:60px; font-weight:bold;">

            ACEPTAR

        </button>

    </div>

</div>
  
  
<footer>
    
    <hr>  
    Derechos autor | prof. JOSÉ VEGA (2026)

</footer>

  
<!-- script src="script.js"></script-->

<script>

const URL="https://script.google.com/macros/s/AKfycbwhNwVktBNWwCYtoan3H_bqo9OAms1HP6yHc_JrJx8ahgeE3luXvVI0ZEeHYwGNi73I/exec";

let campoPendiente="";
  
document
.getElementById("btnPacientes")
.addEventListener("click",nuevoPaciente);
  
document
.getElementById("btnAgenda")
.addEventListener("click",agendamiento);

document
.getElementById("btnAsistencia")
.addEventListener("click",asistencia);

document
.getElementById("btnEstadistica")
.addEventListener("click",estadistica);

  

function nuevoPaciente(){

    document.getElementById("modalNuevoPaciente").style.display="block";
    
    limpiarFormularioNuevoPaciente();
    
    obtenerNuevoPacienteID();
  
}

  
function obtenerNuevoPacienteID(){

      fetch(URL+"?accion=nuevopacienteID")
      
      .then(r=>r.text())
      
      .then(id=>{
      
      document.getElementById("txtID").value=id;
      
      });

}

  
function guardarNuevoPaciente(){

        const nombre=document
        .getElementById("txtNombre")
        .value
        .trim();
        
        if(nombre==""){
        
        mostrarMensaje(
        
      "⚠️ ATENCIÓN",
      "Debe ingresar NOMBRE DEL NUEVO PACIENTE",
      "txtNombre"
        
        );
        
        return;
        
        }
        
        const datos={
        
        accion: "PACIENTES",
        id:document.getElementById("txtID").value,
        nombre:document.getElementById("txtNombre").value,
        celular:document.getElementById("txtCelular").value,
        correo:document.getElementById("txtCorreo").value,
        diagnostico:document.getElementById("txtDiagnostico").value
        };
        
        fetch(URL,{
        method:"POST",
        body:JSON.stringify(datos)
        })
        
/*        .then(r=>r.text())
        .then(res=>{   */

      .then(r=>r.text())
      .then(()=>{

      document.getElementById("mensajeNuevoPaciente").innerHTML=
      "<h2 style='color:green'>😎 Nuevo Paciente registrado ✔</h2>";
      
      setTimeout(()=>{
      
      cerrarNuevoPaciente();
      
      limpiarFormularioNuevoPaciente();
        
      
      document.getElementById("mensajeNuevoPaciente").innerHTML="";
      
      },1000);
      
      });

}

    
function limpiarFormularioNuevoPaciente(){

      document.getElementById("txtNombre").value="";
      
      document.getElementById("txtCelular").value="";
      
      document.getElementById("txtCorreo").value="";
      
      document.getElementById("txtDiagnostico").value="";
      
      document.getElementById("txtNombre").focus();

}
  
  
function agendamiento(){

document.getElementById("modalAgenda").style.display="block";

limpiarFormularioAgendamiento();

obtenerNuevoAgendamientoID();

}  

  
function guardarAgendamientoPaciente(){

      const fecha=document.getElementById("fechaCita").value;
      
      const hora=document.getElementById("horaCita").value;
      
      const nombre=document
      .getElementById("nombrePaciente")
      .value
      .trim();

  
      if(fecha==""){
          
          mostrarMensaje(
          "⚠️ ATENCIÓN",
          "Debe seleccionar FECHA DE CITA",
          "fechaCita"
          );
          
          return;      
      }
  
      if(hora==""){
          
          mostrarMensaje(
          "⚠️ ATENCIÓN",
          "Debe seleccionar HORA DE CITA",
          "horaCita"
          );
          
          return;
      }

      if(nombre==""){
          
          mostrarMensaje(      
          "⚠️ ATENCIÓN",
          "Debe ingresar NOMBRE DEL PACIENTE",
          "nombrePaciente"
          );
          
          return;
      }

  
      const datos={

      accion: "MAESTRA",        
      id:document.getElementById("idPaciente").value,
      fechaCita:fecha,
      hora:hora,
      nombre:nombre.toUpperCase(),
      celular:document.getElementById("celular").value,
      correo:document.getElementById("correo").value.toUpperCase(),
      diagnostico:document.getElementById("diagnostico").value.toUpperCase()
      };

      
      fetch(URL,{
      method:"POST",
      body:JSON.stringify(datos)
      })
      
      .then(r=>r.text())
      .then(()=>{
    
      document.getElementById("mensajeAgendamiento").innerHTML=
      "<h2 style='color:green'>😎 Agendamiento exitoso ✔</h2>";
      
      setTimeout(()=>{
      
      cerrarAgendamiento();
      
      limpiarFormularioAgendamiento();
      
      document.getElementById("mensajeAgendamiento").innerHTML="";
      
      },1000);
      
      });

}  


function limpiarFormularioAgendamiento(){

      document.getElementById("fechaCita").value="";
      
      document.getElementById("horaCita").value="";
      
      document.getElementById("nombrePaciente").value="";
      
      document.getElementById("celular").value="";
      
      document.getElementById("correo").value="";
      
      document.getElementById("diagnostico").value="";
      
      // Colocar el cursor en el primer campo
      document.getElementById("fechaCita").focus();

}

  
function obtenerNuevoAgendamientoID(){

      fetch(URL+"?accion=nuevoagendamientoID")
      
      .then(r=>r.text())
      
      .then(id=>{
      
      document.getElementById("idPaciente").value=id;
      
      });

}

  
function cerrarAgendamiento(){

      document.getElementById("modalAgenda").style.display="none";
}  


function cerrarNuevoPaciente(){

      document.getElementById("modalNuevoPaciente").style.display="none";
}  
  

function mostrarMensaje(titulo,texto,campo){
  
      campoPendiente=campo;
      
      document.getElementById("tituloMensaje").innerHTML=titulo;
      
      document.getElementById("textoMensaje").innerHTML=texto;
      
      document.getElementById("modalMensaje").style.display="block";

}

  
function cerrarMensaje(){

      document.getElementById("modalMensaje").style.display="none";
      
      if(campoPendiente!=""){
      
      document.getElementById(campoPendiente).focus();
      
    }

}  


function asistencia(){
      
      document.getElementById("contenido").innerHTML=
      "<h2>Módulo de Asistencia</h2>";
}

  
function estadistica(){
    
    document.getElementById("contenido").innerHTML=
    "<h2>Módulo Estadística</h2>";
}

  
  
</script>    


  
</body>
</html>
